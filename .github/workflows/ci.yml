name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        pip install -r credit_scoring_project/requirements.txt

    - name: Run tests
      run: |
        pytest credit_scoring_project/tests

    - name: Build Docker image
      run: |
        docker build -t credit-scoring-api ./credit_scoring_project